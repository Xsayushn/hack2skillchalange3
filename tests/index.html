<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoFootprint | Client Test Suite</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0b0f19;
      color: #f8fafc;
      padding: 2.5rem;
      margin: 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 {
      font-size: 1.75rem;
      margin: 0;
      color: #34d399;
    }
    .btn {
      background: #10b981;
      color: #042f1a;
      border: none;
      padding: 0.65rem 1.25rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }
    .summary-card {
      background: rgba(22, 30, 49, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2.0rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      text-align: center;
    }
    .summary-stat {
      display: flex;
      flex-direction: column;
    }
    .stat-val {
      font-size: 2rem;
      font-weight: 800;
    }
    .stat-lbl {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 0.25rem;
    }
    .test-case {
      background: rgba(22, 30, 49, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .test-case.pass {
      border-left: 4px solid #10b981;
    }
    .test-case.fail {
      border-left: 4px solid #ef4444;
      background: rgba(239, 68, 68, 0.05);
    }
    .test-info h3 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }
    .test-info p {
      margin: 0.25rem 0 0 0;
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .test-status {
      font-weight: 700;
      font-size: 0.9rem;
    }
    .test-status.pass { color: #10b981; }
    .test-status.fail { color: #ef4444; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div>
        <h1>EcoFootprint Test Runner</h1>
        <p style="color: #94a3b8; margin: 0.25rem 0 0 0; font-size: 0.9rem;">Automated code validation suite running client-side</p>
      </div>
      <div>
        <button class="btn" onclick="runTests()"><i class="fa-solid fa-rotate"></i> Re-Run Tests</button>
        <a href="../index.html" style="color: #94a3b8; margin-left: 1rem; text-decoration: none; font-size: 0.9rem;"><i class="fa-solid fa-arrow-left"></i> Back to App</a>
      </div>
    </div>

    <!-- Summary Counts -->
    <div class="summary-card">
      <div class="summary-stat">
        <span class="stat-val" id="stat-total">0</span>
        <span class="stat-lbl">Total Tests</span>
      </div>
      <div class="summary-stat">
        <span class="stat-val" style="color: #10b981;" id="stat-passed">0</span>
        <span class="stat-lbl">Passed</span>
      </div>
      <div class="summary-stat">
        <span class="stat-val" style="color: #ef4444;" id="stat-failed">0</span>
        <span class="stat-lbl">Failed</span>
      </div>
      <div class="summary-stat">
        <span class="stat-val" id="stat-pct">0%</span>
        <span class="stat-lbl">Success Rate</span>
      </div>
    </div>

    <!-- Test Log Grid -->
    <h2 style="font-size: 1.25rem; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem;">Test Logs</h2>
    <div id="test-logs-container">
      <!-- Dynamically filled with test outputs -->
    </div>
  </div>

  <!-- Import core scripts to test -->
  <script src="../calculator.js"></script>
  <script src="../assistant.js"></script>
  
  <!-- Custom mock profile object for application mocking -->
  <script>
    // Stub global app object required by modules
    window.app = {
      userProfile: {
        name: "Test User",
        region: "US",
        xp: 0,
        habits: [],
        inputs: null,
        awardedAchievements: []
      },
      carbonData: null,
      saveProfile() {},
      updateDashboard() {},
      grantXP(amt) { this.userProfile.xp += amt; },
      showToast(msg, type) { console.log("Toast:", type, msg); }
    };
  </script>

  <!-- Load and run tests -->
  <script src="suite.js"></script>
</body>
</html>
